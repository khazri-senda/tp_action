name: CI/CD Workflow Springboot + Angular + Docker

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Installer JDK 11 et Maven
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Set up Maven
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      # 3. Installer Node.js (Angular)
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      # 4. Build backend (Spring Boot)
      - name: Build Backend with Maven
        working-directory: ./springboot
        run: mvn clean package -DskipTests

      # 5. Build frontend (Angular)
      - name: Build Frontend
        working-directory: ./angular-app
        run: |
          npm install
          npm run build -- --prod

      # 6. Se connecter à Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 7. Build et push backend Docker image
      - name: Build Backend Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/spring-app:latest ./springboot
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/spring-app:latest

      # 8. Build et push frontend Docker image
      - name: Build Frontend Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest ./angular-app
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest

      # 9. Lancer les conteneurs pour test
      - name: Start application with Docker Compose
        run: |
          docker compose up -d
          docker ps

      # 10. Nettoyer après test
      - name: Stop Docker Compose
        run: docker compose down
