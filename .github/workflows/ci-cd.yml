name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- Installer JDK 11 pour Spring Boot ---
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Set up Maven
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      # --- Installer Node.js pour Angular ---
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'  # sans cache: 'none'

      # --- Build Spring Boot JAR ---
      - name: Build Backend with Maven
        working-directory: ./springboot/app
        run: mvn clean package -DskipTests

      # --- Login Docker Hub ---
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # --- Build & Push Backend Docker image ---
      - name: Build backend image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app:latest ./springboot/app
      - name: Push backend image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app:latest

      # --- Build & Push Frontend Docker image ---
      - name: Build frontend image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest ./angular-app
      - name: Push frontend image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest

  test-application:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🔹 Login Docker Hub pour accéder aux images privées (optionnel)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 🔹 Lancer Docker Compose en construisant les images localement
      - name: Run Docker Compose
        run: docker compose -f docker-compose.yml up -d --build

      - name: Check running containers
        run: docker ps

      - name: Show logs
        run: docker compose -f docker-compose.yml logs
