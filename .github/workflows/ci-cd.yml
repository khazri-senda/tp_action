name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Backend - JDK 11 + Maven
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build Backend
        working-directory: ./springboot/app
        run: mvn clean package -DskipTests

      # 3️⃣ Frontend - Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: angular-app/package-lock.json

      - name: Build Frontend
        working-directory: ./angular-app
        run: |
          npm install
          npm run build -- --output-path=dist

      # 4️⃣ Build Docker images via Compose
      - name: Build and run containers
        run: docker compose -f docker-compose.yml up -d --build

      # 5️⃣ Wait a bit for containers to start
      - name: Wait for services
        run: sleep 30

      # 6️⃣ Check running containers
      - name: List running containers
        run: docker ps

      # 7️⃣ Show logs
      - name: Show container logs
        run: docker compose -f docker-compose.yml logs
