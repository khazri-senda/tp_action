name: CI/CD Spring Boot + Angular + Docker

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Récupération du code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Java pour Maven
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'

      # 3️⃣ Build le JAR Spring Boot
      - name: Build Spring Boot JAR
        working-directory: ./springboot/app
        run: mvn clean package -DskipTests

      # 4️⃣ Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 5️⃣ Connexion à Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 6️⃣ Build et push de l'image Spring Boot
      - name: Build and push Spring Boot image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/springboot:latest ./springboot/app
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/springboot:latest

      # 7️⃣ Build Angular (frontend)
      - name: Install Angular dependencies & build
        working-directory: ./angular-app
        run: |
          npm install
          npx ng build --configuration production

      # 8️⃣ Build et push de l'image Angular
      - name: Build and push Angular image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest ./angular-app
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest

      # 9️⃣ Lancement de l’application avec Docker Compose
      - name: Run Docker Compose
        run: docker-compose -f docker-compose.yml up -d

      # 🔟 Vérification rapide (optionnel)
      - name: List running containers
        run: docker ps
