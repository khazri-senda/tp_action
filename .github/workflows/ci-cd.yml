name: CI/CD Spring Boot + Angular + Docker

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./  # Répertoire racine du repo

    steps:
      # 1️⃣ Checkout du code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup JDK pour Spring Boot
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'

      # 3️⃣ Setup Node.js pour Angular
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18' 

      # 4️⃣ Install Angular dependencies
      - name: Install Angular dependencies
        working-directory: ./angular-app   # <-- dossier Angular
        run: |
          npm install
          ng build --configuration production

      # 5️⃣ Build Spring Boot
      - name: Build Spring Boot
        working-directory: ./spring-backend  # <-- dossier Spring Boot
        run: ./mvnw clean package -DskipTests

      # 6️⃣ Docker Compose (si tu veux lancer containers)
      - name: Build and run Docker Compose
        run: docker-compose -f docker-compose.yml up --build -d

      # 7️⃣ Optional: Run tests (Angular + Spring Boot)
      - name: Run Angular tests
        working-directory: ./angular-app
        run: npm test -- --watch=false --browsers=ChromeHeadless

      - name: Run Spring Boot tests
        working-directory: ./spring-backend
        run: ./mvnw test
