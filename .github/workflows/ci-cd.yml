name: CI/CD Spring Boot + Angular + Docker

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Récupération du code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Docker Buildx (nécessaire pour builder des images multi-platform)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 3️⃣ Connexion à Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4️⃣ Build et push de l'image Spring Boot (backend)
      - name: Build and push Spring Boot image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/springboot:latest ./springboot/app
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/springboot:latest

      # 5️⃣ Build et push de l'image Angular (frontend)
      - name: Build and push Angular image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest ./angular-app
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest

      # 6️⃣ Lancement de l’application avec Docker Compose
      - name: Run Docker Compose
        run: |
          docker-compose -f docker-compose.yml up -d

      # 7️⃣ Vérification rapide (optionnel)
      - name: List running containers
        run: docker ps
